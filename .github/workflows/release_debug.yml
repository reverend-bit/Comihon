name: Build & Release Debug APK

on:
  push:
    branches:
      - 'copilot/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: false

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-universal-debug.apk comihon-debug.apk

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: debug-latest
          name: "Comihon Debug Build"
          body: |
            > **No git required!** Download `comihon-debug.apk` below and install it on your Android device (Android 8.0+).

            This debug APK is built from the latest commit on `${{ github.ref_name }}`.

            **Commit:** `${{ github.sha }}`

            > [!NOTE]
            > This is a debug build for testing purposes. It is unsigned with the release key.
          files: comihon-debug.apk
          prerelease: true
          make_latest: false
